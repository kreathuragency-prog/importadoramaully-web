<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Panel{% endblock %} — Maully Bea</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">Maully Bea <span>CRM</span></div>
        <a href="/crm" class="{% if active == 'dashboard' %}active{% endif %}">Dashboard</a>
        <a href="/crm/conversations" class="{% if active == 'conversations' %}active{% endif %}">Chats</a>
        <a href="/crm/leads" class="{% if active == 'leads' %}active{% endif %}">Leads</a>
        <a href="/admin" style="color:#d4af37">Panel E-Commerce →</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
