<style>
:root{--dark:#1a1a2e;--gold:#d4af37;--gold-light:#f5ecd0;--green-wa:#25d366}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fafaf5;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
.cat-header{background:var(--dark);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.cat-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff;font-size:.9rem}
.cat-logo-icon{width:32px;height:32px;background:var(--gold);color:var(--dark);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem}
.cat-logo strong{color:var(--gold)}
.cat-back{color:var(--gold);text-decoration:none;font-size:.85rem;display:flex;align-items:center;gap:6px}
.cat-back:hover{text-decoration:underline}

/* BANNER */
.cat-banner{background:linear-gradient(135deg,var(--dark) 0%,#2a2a4e 50%,var(--dark) 100%);padding:60px 24px;text-align:center;position:relative;overflow:hidden}
.cat-banner::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 50%,rgba(212,175,55,.08) 0%,transparent 50%);pointer-events:none}
.cat-banner-icon{width:80px;height:80px;background:var(--gold);color:var(--dark);border-radius:20px;display:inline-flex;align-items:center;justify-content:center;font-size:2.2rem;margin-bottom:20px;box-shadow:0 8px 32px rgba(212,175,55,.3)}
.cat-banner h1{color:#fff;font-size:2rem;margin-bottom:8px;letter-spacing:-.5px}
.cat-banner h1 span{color:var(--gold)}
.cat-banner p{color:rgba(255,255,255,.7);font-size:1rem;max-width:500px;margin:0 auto 28px}
.cat-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.cat-btn{display:inline-flex;align-items:center;gap:10px;padding:14px 28px;border-radius:10px;font-size:.95rem;font-weight:600;text-decoration:none;cursor:pointer;border:none;transition:all .2s}
.cat-btn-primary{background:var(--gold);color:var(--dark)}.cat-btn-primary:hover{background:#c9a030;transform:translateY(-1px)}
.cat-btn-download{background:rgba(255,255,255,.1);color:#fff;border:1.5px solid rgba(255,255,255,.2)}.cat-btn-download:hover{background:rgba(255,255,255,.15);transform:translateY(-1px)}
.cat-btn-wa{background:var(--green-wa);color:#fff}.cat-btn-wa:hover{background:#1fb855;transform:translateY(-1px)}

/* PDF VIEWER */
.cat-viewer{flex:1;max-width:900px;width:100%;margin:0 auto;padding:24px}
.cat-viewer-frame{width:100%;height:80vh;border:none;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.1);background:#fff}

/* FOOTER STRIP */
.cat-footer{background:var(--dark);padding:16px 24px;text-align:center;color:rgba(255,255,255,.5);font-size:.78rem}
.cat-footer a{color:var(--gold);text-decoration:none}

/* MOBILE */
@media(max-width:600px){
  .cat-banner{padding:40px 16px}
  .cat-banner-icon{width:60px;height:60px;font-size:1.6rem;border-radius:14px}
  .cat-banner h1{font-size:1.5rem}
  .cat-banner p{font-size:.88rem}
  .cat-actions{flex-direction:column;align-items:center}
  .cat-btn{width:100%;max-width:320px;justify-content:center;padding:12px 20px;font-size:.88rem}
  .cat-viewer{padding:12px}
  .cat-viewer-frame{height:70vh;border-radius:8px}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="cat-header">
  <a href="/" class="cat-logo">
    <div class="cat-logo-icon">M</div>
    Importadora <strong>Maully</strong>
  </a>
  <a href="/" class="cat-back"><i class="fas fa-arrow-left"></i> Volver a la tienda</a>
</header>

<!-- BANNER -->
<section class="cat-banner">
  <div class="cat-banner-icon"><i class="fas fa-book-open"></i></div>
  <h1>Catálogo <span>Completo</span></h1>
  <p>Todos nuestros fardos de ropa americana y europea con precios actualizados. Envíos a todo Chile.</p>
  <div class="cat-actions">
    <a href="#visor" class="cat-btn cat-btn-primary"><i class="fas fa-eye"></i> Ver Catálogo</a>
    <a href="catalogo-maully.pdf" download class="cat-btn cat-btn-download"><i class="fas fa-download"></i> Descargar PDF</a>

  </div>
</section>

<!-- PDF VIEWER -->
<section class="cat-viewer" id="visor">

</section>

<!-- FOOTER -->
<footer class="cat-footer">
  Importadora Maully &mdash; +40 años importando ropa premium &mdash; <a href="/">www.importadoramaully.cl</a>
</footer>

</body>
